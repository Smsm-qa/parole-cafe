<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAROLE Cafe | المتجر والمنيو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
          --gold: #d4af37;
          --gold-light: #f3e5ab;
          --dark-bg: #0b0b0b;
          --card-bg: #161616;
          --border-color: #262626;
          --text-main: #f0f0f0;
          --text-muted: #999999;
          --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-main); line-height: 1.7; direction: rtl; text-align: right; overflow-x: hidden; }
        
        header { background: rgba(11, 11, 11, 0.9); backdrop-filter: blur(12px); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 18px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 300; color: var(--gold); letter-spacing: 4px; text-decoration: none; text-transform: uppercase; }
        
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 13px; letter-spacing: 0.5px; transition: var(--transition); white-space: nowrap; }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }
        
        .menu-toggle { display: none; font-size: 22px; color: var(--gold); cursor: pointer; background: none; border: none; }

        .shop-wrapper { padding: 140px 40px 100px; max-width: 1400px; margin: 0 auto; }
        .menu-main-title { text-align: center; font-size: 42px; font-weight: 300; color: var(--gold); margin-bottom: 10px; letter-spacing: 4px; }
        .menu-sub-title { text-align: center; color: var(--text-muted); margin-bottom: 40px; font-size: 15px; letter-spacing: 2px; }
        
        .filter-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 50px; flex-wrap: wrap; }
        .filter-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px 22px; border-radius: 30px; cursor: pointer; transition: var(--transition); font-size: 13px; }
        .filter-btn:hover, .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 500; }

        .category-section-title { font-size: 20px; color: var(--gold); margin: 50px 0 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; font-weight: 300; display: flex; align-items: center; gap: 12px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .product-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); transition: var(--transition); display: flex; flex-direction: column; position: relative; }
        .product-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .product-badge { background: var(--gold); color: #000; font-size: 10px; padding: 4px 10px; position: absolute; top: 15px; right: 15px; border-radius: 20px; font-weight: 600; text-transform: uppercase; z-index: 2; }
        .product-card-img { width: 100%; height: 180px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 35px; border-bottom: 1px solid var(--border-color); cursor: pointer; }

        .product-info { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 17px; color: var(--text-main); margin-bottom: 8px; font-weight: 400; cursor: pointer; }
        .product-title:hover { color: var(--gold); }
        .product-price { color: var(--gold); font-size: 16px; font-weight: 500; margin-bottom: 20px; }
        
        .btn-add { margin-top: auto; background-color: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; width: 100%; border-radius: 6px; font-size: 12px; cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; }
        .btn-add:hover { background-color: var(--gold); color: #000; }

        footer { background-color: #070707; padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 14px; }

        @media (max-width: 1024px) {
            .menu-toggle { display: block; }
            .nav-links { position: fixed; top: 75px; right: -100%; flex-direction: column; background-color: rgba(15, 15, 15, 0.98); width: 100%; height: calc(100vh - 75px); padding: 40px 0; transition: 0.4s ease-in-out; border-top: 1px solid var(--border-color); align-items: center; }
            .nav-links.active { right: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">PAROLE Cafe</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="about.html">من نحن</a></li>
                <li><a href="shop.html" class="active">المتجر والمنيو</a></li>
                <li><a href="offers.html">العروض</a></li>
                <li><a href="branches.html">فروعنا</a></li>
                <li><a href="blog.html">المدونة</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-bag-shopping"></i> السلة</a></li>
            </ul>
            <button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <div class="shop-wrapper">
        <h1 class="menu-main-title">قائمة المنيو الحصرية</h1>
        <p class="menu-sub-title">تذوق أفقاً جديداً من الفخامة والجودة في كل رشفة</p>

        <div class="filter-tabs">
            <button class="filter-btn active" onclick="filterCategory('all')">المجموعة الكاملة</button>
            <button class="filter-btn" onclick="filterCategory('featured')">⭐ الإصدارات الخاصة</button>
            <button class="filter-btn" onclick="filterCategory('new')">✨ الإطلاقات الجديدة</button>
            <button class="filter-btn" onclick="filterCategory('bestseller')">🔥 الأكثر طلباً</button>
            <button class="filter-btn" onclick="filterCategory('hot')">☕ المشروبات الدافئة</button>
            <button class="filter-btn" onclick="filterCategory('cold')">🧊 المشروبات المثلجة</button>
            <button class="filter-btn" onclick="filterCategory('mojito')">🍋 موهيتو فاخر</button>
            <button class="filter-btn" onclick="filterCategory('desserts')">🍰 الحلويات الراقية</button>
        </div>

        <div id="products-container"></div>
    </div>

    <footer>
        <p>&copy; 2026 PAROLE Cafe. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        const products = [
            { id: 1, name: 'إسبريسو', price: 7, category: 'hot', tag: 'bestseller', icon: 'fa-mug-hot' },
            { id: 2, name: 'ماتشاتو / ميكياتو', price: 9, category: 'hot', tag: 'new', icon: 'fa-mug-hot' },
            { id: 3, name: 'كورتادو', price: 11, category: 'hot', tag: 'featured', icon: 'fa-mug-hot' },
            { id: 4, name: 'لاتيه', price: 12, category: 'hot', tag: 'bestseller', icon: 'fa-mug-hot' },
            { id: 5, name: 'كابتشينو', price: 12, category: 'hot', tag: 'featured', icon: 'fa-mug-hot' },
            { id: 6, name: 'فلات وايت', price: 12, category: 'hot', tag: 'new', icon: 'fa-mug-hot' },
            { id: 7, name: 'أمريكانو', price: 9, category: 'hot', tag: '', icon: 'fa-mug-hot' },
            { id: 8, name: 'سبانيش لاتيه', price: 14, category: 'hot', tag: 'bestseller', icon: 'fa-mug-hot' },
            { id: 9, name: 'ايس سبانيش لاتيه', price: 16, category: 'cold', tag: 'bestseller', icon: 'fa-glass-water' },
            { id: 10, name: 'ايس فيستاشيو', price: 19, category: 'cold', tag: 'featured', icon: 'fa-glass-water' },
            { id: 11, name: 'كولد برو', price: 16, category: 'cold', tag: 'new', icon: 'fa-glass-water' },
            { id: 12, name: 'ايس أمريكانو', price: 11, category: 'cold', tag: '', icon: 'fa-glass-water' },
            { id: 13, name: 'بلودي ماري (موهيتو)', price: 18, category: 'mojito', tag: '', icon: 'fa-lemon' },
            { id: 14, name: 'جولد ديسيرت (موهيتو)', price: 18, category: 'mojito', tag: 'featured', icon: 'fa-lemon' },
            { id: 15, name: 'كريب', price: 22, category: 'desserts', tag: 'bestseller', icon: 'fa-cake-candles' },
            { id: 16, name: 'وافل', price: 22, category: 'desserts', tag: 'new', icon: 'fa-cake-candles' }
        ];

        function renderProducts(filter = 'all') {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            let filtered = products;
            if (filter === 'featured') filtered = products.filter(p => p.tag === 'featured');
            else if (filter === 'new') filtered = products.filter(p => p.tag === 'new');
            else if (filter === 'bestseller') filtered = products.filter(p => p.tag === 'bestseller');
            else if (['hot', 'cold', 'mojito', 'desserts'].includes(filter)) {
                filtered = products.filter(p => p.category === filter);
            }

            if(filter === 'all') {
                const categories = [
                    { key: 'hot', title: 'المشروبات الدافئة', icon: 'fa-mug-hot' },
                    { key: 'cold', title: 'المشروبات المثلجة', icon: 'fa-glass-water' },
                    { key: 'mojito', title: 'مشروبات الموهيتو الفاخرة', icon: 'fa-lemon' },
                    { key: 'desserts', title: 'الحلويات الراقية', icon: 'fa-cake-candles' }
                ];

                categories.forEach(cat => {
                    const catItems = products.filter(p => p.category === cat.key);
                    if(catItems.length > 0) {
                        const titleEl = document.createElement('h2');
                        titleEl.className = 'category-section-title';
                        titleEl.innerHTML = `<i class="fa-solid ${cat.icon}"></i> ${cat.title}`;
                        container.appendChild(titleEl);

                        const gridEl = document.createElement('div');
                        gridEl.className = 'products-grid';
                        catItems.forEach(product => {
                            gridEl.appendChild(createProductCard(product));
                        });
                        container.appendChild(gridEl);
                    }
                });
            } else {
                const gridEl = document.createElement('div');
                gridEl.className = 'products-grid';
                filtered.forEach(product => {
                    gridEl.appendChild(createProductCard(product));
                });
                container.appendChild(gridEl);
            }
        }

        function createProductCard(product) {
            let badgeText = '';
            if (product.tag === 'featured') badgeText = 'خاص';
            else if (product.tag === 'new') badgeText = 'جديد';
            else if (product.tag === 'bestseller') badgeText = 'الأكثر طلباً';

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-card-img" onclick="openProductDetails(${product.id})">
                    ${badgeText ? `<span class="product-badge">${badgeText}</span>` : ''}
                    <i class="fa-solid ${product.icon}"></i>
                </div>
                <div class="product-info">
                    <h3 class="product-title" onclick="openProductDetails(${product.id})">${product.name}</h3>
                    <div class="product-price">${product.price} ر.س</div>
                    <button class="btn-add" onclick="addToCart('${product.name}', ${product.price})">إضافة للحقيـبة</button>
                </div>
            `;
            return card;
        }

        function filterCategory(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(type);
        }

        function openProductDetails(id) {
            window.location.href = `product.html?id=${id}`;
        }

        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem('parole_cart')) || [];
            let found = cart.find(item => item.name === name);
            if(found) {
                found.quantity += 1;
            } else {
                cart.push({ name: name, price: parseFloat(price), quantity: 1 });
            }
            localStorage.setItem('parole_cart', JSON.stringify(cart));
            alert('تمت إضافة ' + name + ' إلى حقيبة التسوق بنجاح.');
        }

        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            let icon = menuToggle.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        });

        document.addEventListener('DOMContentLoaded', () => renderProducts('all'));
    </script>
</body>
</html>
