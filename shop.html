<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAROLE Cafe | المنيو الفاخر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f9d976;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9d976 100%);
            --dark-bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: rgba(212, 175, 55, 0.2);
            --ease-out-quad: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--dark-bg); color: var(--text-main); overflow-x: hidden; padding-bottom: 100px; }
        
        header { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .nav-container { max-width: 1300px; margin: 0 auto; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .nav-right, .nav-left { display: flex; align-items: center; gap: 15px; }
        
        .menu-toggle-btn { background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; transition: var(--ease-out-quad); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; }
        .menu-toggle-btn:hover { background: rgba(212,175,55,0.1); }

        .logo { font-size: 22px; font-weight: 800; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; letter-spacing: 1px; }
        
        .cart-btn { background: rgba(212,175,55,0.1); border: 1px solid var(--border-color); color: var(--gold); padding: 8px 16px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: var(--ease-out-quad); position: relative; }
        .cart-btn:hover { background: var(--gold); color: #000; transform: translateY(-2px); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        /* Sidebar Drawer (القائمة الجانبية الثلاثة خطوط) */
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2500; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .sidebar-overlay.open { opacity: 1; visibility: visible; }
        
        .sidebar-drawer { position: fixed; top: 0; right: -300px; width: 300px; height: 100%; background: #111; border-left: 1px solid var(--border-color); z-index: 2600; transition: right 0.4s var(--ease-out-quad); display: flex; flex-direction: column; padding: 25px; }
        .sidebar-overlay.open .sidebar-drawer { right: 0; }
        
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 20px; }
        .sidebar-title { font-size: 18px; font-weight: 800; color: var(--gold); }
        .sidebar-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .sidebar-close:hover { color: var(--gold); transform: rotate(90deg); }

        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 15px; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 15px; color: var(--text-muted); text-decoration: none; font-size: 16px; font-weight: 600; padding: 12px 15px; border-radius: 12px; transition: 0.3s; }
        .sidebar-menu li a i { color: var(--gold); width: 20px; text-align: center; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background: rgba(212,175,55,0.1); color: #fff; transform: translateX(-5px); }

        .filters-section { position: sticky; top: 66px; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(5px); z-index: 900; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .filters-container { display: flex; gap: 10px; overflow-x: auto; padding: 0 25px 5px 25px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .filters-container::-webkit-scrollbar { display: none; }
        .filter-btn { background: #141414; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px 24px; border-radius: 50px; cursor: pointer; transition: var(--ease-out-quad); font-size: 14px; font-weight: 600; white-space: nowrap; }
        .filter-btn:hover { color: #fff; border-color: var(--gold); }
        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 4px 15px rgba(212,175,55,0.3); }

        .shop-main { padding: 30px 25px; max-width: 1300px; margin: 0 auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); transition: var(--ease-out-quad); display: flex; flex-direction: column; position: relative; opacity: 0; animation: fadeIn 0.5s forwards; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(212,175,55,0.15); }
        
        .img-box { width: 100%; height: 200px; overflow: hidden; position: relative; cursor: pointer; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s var(--ease-out-quad); }
        .product-card:hover .img-box img { transform: scale(1.05); }
        
        .card-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .p-title { font-size: 18px; color: #fff; margin-bottom: 8px; font-weight: 700; cursor: pointer; }
        .p-desc { color: var(--text-muted); font-size: 13px; margin-bottom: 15px; flex-grow: 1; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .p-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .p-price { font-size: 18px; font-weight: 800; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .add-btn { background: var(--gold); color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: var(--ease-out-quad); box-shadow: 0 4px 10px rgba(212,175,55,0.3); }
        .add-btn:hover { transform: scale(1.1) rotate(90deg); background: #fff; }
        .add-btn:active { transform: scale(0.95); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-content { background: #121212; border: 1px solid var(--gold); width: 90%; max-width: 500px; border-radius: 24px; overflow: hidden; transform: scale(0.9); transition: transform 0.3s var(--ease-out-quad); position: relative; padding: 30px; }
        .modal-overlay.open .modal-content { transform: scale(1); }
        .modal-close { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); color: #fff; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 10; display: flex; align-items: center; justify-content: center; transition: var(--ease-out-quad); }
        .modal-close:hover { background: var(--gold); color: #000; transform: rotate(90deg); }
        .m-img { width: 100%; height: 230px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
        .m-title { font-size: 22px; color: #fff; font-weight: 800; margin-bottom: 8px; }
        .m-price { font-size: 20px; font-weight: 800; color: var(--gold); margin-bottom: 12px; }
        .m-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; line-height: 1.7; }
        .m-add-btn { width: 100%; padding: 15px; background: var(--gold-gradient); border: none; border-radius: 16px; font-size: 17px; font-weight: 800; color: #000; cursor: pointer; transition: var(--ease-out-quad); }
        .m-add-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212,175,55,0.3); }

        .floating-cart { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); width: 90%; max-width: 600px; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px); border: 1px solid var(--gold); border-radius: 50px; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1500; transition: transform 0.4s var(--ease-out-quad), opacity 0.4s; opacity: 0; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .floating-cart.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .fc-text { color: var(--text-muted); font-size: 14px; font-weight: 600; }
        .fc-text span { color: var(--gold); font-weight: 800; }
        .fc-checkout { background: var(--gold-gradient); color: #000; border: none; padding: 12px 28px; border-radius: 30px; font-weight: 800; font-size: 14px; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; transition: var(--ease-out-quad); }
        .fc-checkout:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }

        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-50px); background: var(--gold); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 800; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 3000; transition: transform 0.4s var(--ease-out-quad), opacity 0.4s; opacity: 0; pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @keyframes fadeIn { to { opacity: 1; } }

        @media (max-width: 768px) {
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            .shop-main { padding: 20px 15px; }
            .img-box { height: 150px; }
            .card-body { padding: 12px; }
            .p-title { font-size: 15px; }
            .p-desc { font-size: 12px; }
        }
    </style>
</head>

        function toggleSidebar() {
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        function renderProducts(items) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            items.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div class="img-box" onclick="openModal(${p.id})">
                        <img src="${p.img}" alt="${p.name}" loading="lazy">
                    </div>
                    <div class="card-body">
                        <h3 class="p-title" onclick="openModal(${p.id})">${p.name}</h3>
                        <p class="p-desc">${p.desc}</p>
                        <div class="p-footer">
                            <span class="p-price">${p.price} ر.س</span>
                            <button class="add-btn" onclick="addToCart(${p.id})" title="إضافة سريعة"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            updateCartUI();
        }

        function filterProducts(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(cat === 'all') {
                renderProducts(products);
            } else {
                renderProducts(products.filter(item => item.category === cat));
            }
        }

        function addToCart(id) {
            const p = products.find(item => item.id === id);
            // تم توحيد مفتاح التخزين هنا ليطابق cart.html تماماً ('parole_cart')
            let cart = JSON.parse(localStorage.getItem('parole_cart')) || [];
            let existing = cart.find(item => item.name === p.name);
            if(existing) {
                existing.quantity = (existing.quantity || 1) + 1;
            } else {
                cart.push({ name: p.name, price: p.price, image: p.img, quantity: 1 });
            }
            localStorage.setItem('parole_cart', JSON.stringify(cart));
            updateCartUI();
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 1500);
        }

        function openModal(id) {
            const p = products.find(item => item.id === id);
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <img src="${p.img}" class="m-img" alt="${p.name}">
                <h2 class="m-title">${p.name}</h2>
                <div class="m-price">${p.price} ر.س</div>
                <p class="m-desc">${p.desc}</p>
                <button class="m-add-btn" onclick="addToCart(${p.id}); closeModalBtn();">إضافة إلى السلة الآن</button>
            `;
            document.getElementById('productModal').classList.add('open');
        }

        function closeModalBtn() {
            document.getElementById('productModal').classList.remove('open');
        }

        function closeModal(e) {
            if(e.target.id === 'productModal') closeModalBtn();
        }

        function updateCartUI() {
            // تم توحيد مفتاح التخزين هنا أيضاً ('parole_cart')
            let cart = JSON.parse(localStorage.getItem('parole_cart')) || [];
            let totalCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            let totalPrice = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);

            document.getElementById('cart-counter').textContent = totalCount;
            document.getElementById('fcCount').textContent = totalCount;
            document.getElementById('fcTotal').textContent = totalPrice.toFixed(2) + ' ر.س';

            const floatingCart = document.getElementById('floatingCart');
            if(totalCount > 0) {
                floatingCart.classList.add('show');
            } else {
                floatingCart.classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts(products);
        });
    </script>
